name: Notificaciones Diarias BASE

on:
  schedule:
    # Corre a las 20:00 hora Argentina (23:00 UTC)
    - cron: '0 23 * * *'
  workflow_dispatch: # permite correrlo manualmente desde GitHub

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin node-fetch

      - name: Enviar notificaciones
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/send-notifications.js
